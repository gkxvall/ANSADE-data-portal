services:
  postgres:
    image: postgres:16-alpine
    container_name: ansade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ansade
      POSTGRES_PASSWORD: ansade
      POSTGRES_DB: ansade
    ports:
      - "5432:5432"
    volumes:
      - ansade_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ansade -d ansade"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ansade_postgres_data:
